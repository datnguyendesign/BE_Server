# ===================================================================
# APPLICATION CONFIGURATION FILE - GRADUATION PROJECT CORRECTION
# ===================================================================
spring.application.name=BEserver

# 1. Kết nối MongoDB Atlas (Đã bổ sung tên database 'healthcare_db' trước dấu ?)
spring.data.mongodb.uri=mongodb+srv://healthcare_db_user:Dat0941393299dat%40@cluster0.zzbhojz.mongodb.net/healthcare_db?retryWrites=true&w=majority&appName=Cluster0
spring.data.mongodb.auto-index-creation=true

# 2. Cấu hình cổng chạy máy chủ
server.port=${PORT:8080}

# 3. Khóa bảo mật ký mã JWT
jwt.secret=healthcare_secure_token_secret_key_for_graduation_project_dat_nguyen_2026
jwt.expiration=86400000

# 4. Cấu hình xác thực Google OAuth2 (Bổ sung giá trị giả lập để tránh sập ứng dụng)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# 5. Định tuyến sang AI Server FastAPI (Điền sẵn cổng chạy local 8000 của FastAPI)
ai.base-url=${AI_BASE_URL:http://localhost:8000}
ai.internal-token=${AI_INTERNAL_TOKEN:mock-ai-internal-token}
ai.food.predict-path=/api/v1/inference/food-image
ai.chat.path=/api/v1/inference/chat
ai.connect-timeout-ms=5000
ai.read-timeout-ms=30000
nutrition.confident-threshold=0.60

# 6. Cấu hình lưu trữ đám mây AWS S3 (Cung cấp giá trị giả lập để chạy vượt qua vòng khởi tạo Bean)
aws.region=${AWS_REGION:ap-southeast-1}
aws.credentials.access-key=${AWS_CREDENTIALS_ACCESS_KEY:mock-aws-access-key-for-local-dev}
aws.credentials.secret-key=${AWS_CREDENTIALS_SECRET_KEY:mock-aws-secret-key-for-local-dev}

# AWS S3 cho phân tích dinh dưỡng món ăn
aws.s3.nutrition.bucket=${AWS_S3_NUTRITION_BUCKET:mock-nutrition-bucket}
aws.s3.nutrition.prefix=${AWS_S3_NUTRITION_PREFIX:nutrition/}
aws.s3.presign.put-ttl-seconds=${AWS_S3_PRESIGN_PUT_TTL_SECONDS:300}
aws.s3.presign.get-ttl-seconds=${AWS_S3_PRESIGN_GET_TTL_SECONDS:3600}
aws.s3.nutrition.max-bytes=${AWS_S3_NUTRITION_MAX_BYTES:10485760}

# AWS S3 cho hình ảnh/phương tiện cuộc hội thoại Chatbot
aws.s3.chat.bucket=${AWS_S3_CHAT_BUCKET:mock-chat-bucket}
aws.s3.chat.prefix=${AWS_S3_CHAT_PREFIX:chat/}
aws.s3.chat.presign.put-ttl-seconds=${AWS_S3_CHAT_PRESIGN_PUT_TTL_SECONDS:300}
aws.s3.chat.presign.get-ttl-seconds=${AWS_S3_CHAT_PRESIGN_GET_TTL_SECONDS:3600}
aws.s3.chat.max-bytes=${AWS_S3_CHAT_MAX_BYTES:10485760}

# 7. Cấu hình Redis bộ nhớ đệm
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DB:0}

# 8. Tạm thời tắt tính năng kiểm soát tần suất chặn lỗi khi chưa bật Redis Server
ratelimit.enabled=false
ratelimit.chat.send.limit=10
ratelimit.chat.send.window-seconds=10
ratelimit.media.presign.limit=20
ratelimit.media.presign.window-seconds=60

# 9. Các cấu hình bổ sung khác
ai.retry.max-attempts=2
ai.retry.backoff-ms=200
chat.messages.default-limit=30
chat.messages.max-limit=100